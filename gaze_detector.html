<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Détecteur de gaze</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF8F3;
    --surface: #FFFFFF;
    --ink: #1A1814;
    --ink2: #6B6560;
    --ink3: #B0AAA3;
    --border: #E8E3DC;
    --radius: 12px;
    --green: #0F6E56;
    --green-bg: #E1F5EE;
    --green-dark: #085041;
    --red: #A32D2D;
    --red-bg: #FCEBEB;
    --red-dark: #791F1F;
    --amber: #854F0B;
    --amber-bg: #FAEEDA;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 2.5rem 1rem 5rem;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
  }

  .page-header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeUp .5s ease both;
  }

  .page-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3rem);
    color: var(--ink);
    letter-spacing: -.02em;
    margin-bottom: .35rem;
  }

  .page-header p {
    font-size: .875rem;
    color: var(--ink2);
    font-weight: 300;
  }

  .step-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--ink3);
    font-weight: 500;
    margin-bottom: .6rem;
  }

  .film-input-wrap {
    margin-bottom: 1.8rem;
    animation: fadeUp .5s .1s ease both;
    opacity: 0;
    animation-fill-mode: forwards;
  }

  input[type=text] {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    padding: 12px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink);
    transition: border-color .2s;
  }

  input[type=text]:focus {
    outline: none;
    border-color: var(--ink3);
  }

  input[type=text]::placeholder {
    color: var(--ink3);
    font-weight: 300;
  }

  .criteria-section {
    animation: fadeUp .5s .2s ease both;
    opacity: 0;
    animation-fill-mode: forwards;
  }

  .criteria-group {
    margin-bottom: 1rem;
  }

  .group-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .08em;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 8px;
  }

  .group-f { background: var(--green-bg); color: var(--green-dark); }
  .group-m { background: var(--red-bg); color: var(--red-dark); }

  .criteria-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .crit-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    transition: all .15s;
    user-select: none;
  }

  .crit-row:hover { background: #F5F3EE; border-color: var(--ink3); }
  .crit-row.on-female { border-color: var(--green); background: var(--green-bg); }
  .crit-row.on-male { border-color: var(--red); background: var(--red-bg); }

  .cb {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }

  .crit-row.on-female .cb { background: var(--green); border-color: var(--green); }
  .crit-row.on-male .cb { background: var(--red); border-color: var(--red); }

  .tick {
    display: none;
    width: 5px;
    height: 9px;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(45deg) translate(-1px, -1px);
  }

  .crit-row.on-female .tick,
  .crit-row.on-male .tick { display: block; }

  .crit-body { flex: 1; }

  .crit-text {
    font-size: 13px;
    color: var(--ink);
    line-height: 1.55;
  }

  .crit-vocab {
    font-size: 11px;
    color: var(--ink2);
    font-style: italic;
    margin-top: 3px;
  }

  .result-area {
    margin-top: 1.8rem;
    border-radius: var(--radius);
    padding: 20px 22px;
    border: 1px solid var(--border);
    background: #F5F3EE;
    transition: all .3s;
    animation: fadeUp .5s .3s ease both;
    opacity: 0;
    animation-fill-mode: forwards;
  }

  .result-verdict {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .result-sub {
    font-size: 13px;
    color: var(--ink2);
    line-height: 1.65;
  }

  .bar-wrap { margin-top: 14px; }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 7px;
  }

  .bar-label {
    font-size: 11px;
    width: 85px;
    flex-shrink: 0;
    font-weight: 500;
  }

  .bar-track {
    flex: 1;
    height: 6px;
    border-radius: 3px;
    background: rgba(0,0,0,.06);
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .5s ease;
  }

  .bar-count {
    font-size: 11px;
    color: var(--ink3);
    width: 18px;
    text-align: right;
  }

  .vocab-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 12px;
  }

  .word-chip {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--ink2);
  }

  .bottom-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 1rem;
  }

  .reset-btn {
    padding: 8px 20px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--ink2);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
  }

  .reset-btn:hover { border-color: var(--ink3); color: var(--ink); background: var(--surface); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">

  <div class="page-header">
    <h1>Détecteur de gaze</h1>
    <p>Entre ton film et coche les critères que tu observes</p>
  </div>

  <div class="film-input-wrap">
    <div class="step-label">Ton film</div>
    <input type="text" id="film-input" placeholder="Ex : Titanic, Portrait de la jeune fille en feu..." oninput="update()">
  </div>

  <div class="criteria-section">
    <div class="step-label" style="margin-bottom:1rem">Critères — coche ce que tu vois dans le film</div>

    <div class="criteria-group">
      <div class="group-title group-f">Female gaze</div>
      <div class="criteria-grid" id="grid-female"></div>
    </div>

    <div class="criteria-group">
      <div class="group-title group-m">Male gaze</div>
      <div class="criteria-grid" id="grid-male"></div>
    </div>
  </div>

  <div class="result-area" id="result-area">
    <div class="step-label">Résultat</div>
    <div style="font-size:13px;color:var(--ink3)">Coche au moins un critère pour voir le résultat.</div>
  </div>

  <div class="bottom-row">
    <button class="reset-btn" onclick="reset()">Recommencer</button>
  </div>

</div>

<script>
const criteria = [
  { id:'f1', type:'female', text:'Les personnages féminins ont une agence — elles agissent et décident', vocab:"l'agence, un personnage actif" },
  { id:'f2', type:'female', text:'La caméra ne sexualise pas le corps des femmes', vocab:'objectifier, la sexualisation' },
  { id:'f3', type:'female', text:'Les femmes sont représentées de façon multidimensionnelle', vocab:'multidimensionnel/le, la subjectivité' },
  { id:'f4', type:'female', text:'Le film déconstruit les stéréotypes de genre', vocab:'déconstruire, les stéréotypes de genre' },
  { id:'f5', type:'female', text:'Les personnages féminins se parlent entre elles (test de Bechdel)', vocab:'la représentation genrée' },
  { id:'f6', type:'female', text:'Le film propose une société plus égalitaire et inclusive', vocab:'une société égalitaire, inclusif/inclusive' },
  { id:'m1', type:'male', text:'La caméra filme les femmes comme des objets de désir', vocab:'le male gaze, objectifier, le voyeurisme' },
  { id:'m2', type:'male', text:'Les personnages féminins ont un rôle de second plan', vocab:'un rôle de second plan, la représentation genrée' },
  { id:'m3', type:'male', text:'Le film glamourise des comportements de prédateur', vocab:'glamouriser, la banalisation du sexisme' },
  { id:'m4', type:'male', text:'Les normes patriarcales sont présentées comme normales', vocab:'les normes patriarcales, les stéréotypes de genre' },
  { id:'m5', type:'male', text:'La masculinité toxique est valorisée', vocab:'la masculinité toxique' },
  { id:'m6', type:'male', text:'Le consentement est ignoré ou banalisé', vocab:'le consentement, la banalisation du sexisme' },
];

let checked = {};

function renderGrids() {
  ['female','male'].forEach(type => {
    const el = document.getElementById('grid-' + type);
    el.innerHTML = criteria.filter(c => c.type === type).map(c => {
      const on = checked[c.id];
      const cls = on ? (type === 'female' ? 'on-female' : 'on-male') : '';
      return `<div class="crit-row ${cls}" onclick="toggle('${c.id}')">
        <div class="cb"><div class="tick"></div></div>
        <div class="crit-body">
          <div class="crit-text">${c.text}</div>
          <div class="crit-vocab">${c.vocab}</div>
        </div>
      </div>`;
    }).join('');
  });
}

function toggle(id) {
  checked[id] = !checked[id];
  update();
}

function update() {
  renderGrids();
  showResult();
}

function showResult() {
  const area = document.getElementById('result-area');
  const film = document.getElementById('film-input').value.trim();
  const fCount = criteria.filter(c => c.type === 'female' && checked[c.id]).length;
  const mCount = criteria.filter(c => c.type === 'male' && checked[c.id]).length;
  const total = fCount + mCount;

  if (total === 0) {
    area.style.background = '#F5F3EE';
    area.style.borderColor = 'var(--border)';
    area.innerHTML = `<div class="step-label">Résultat</div><div style="font-size:13px;color:var(--ink3)">Coche au moins un critère pour voir le résultat.</div>`;
    return;
  }

  const fPct = Math.round((fCount / total) * 100);
  const mPct = 100 - fPct;
  const isFemale = fCount > mCount;
  const isMixed = fCount === mCount;

  let verdict, sub, bg, borderColor;

  if (isMixed) {
    verdict = 'Regard ambigu';
    sub = `Ce film mélange les deux regards — ${fCount} critère${fCount > 1 ? 's' : ''} female gaze et ${mCount} male gaze. Une analyse nuancée s'impose !`;
    bg = '#FAEEDA';
    borderColor = '#854F0B';
  } else if (isFemale) {
    verdict = 'Female gaze';
    sub = `${film ? '<em>' + film + '</em> porte' : 'Ce film porte'} un regard féminin : ${fCount} critère${fCount > 1 ? 's' : ''} sur ${total} pointent vers le female gaze.`;
    bg = '#E1F5EE';
    borderColor = '#0F6E56';
  } else {
    verdict = 'Male gaze';
    sub = `${film ? '<em>' + film + '</em> porte' : 'Ce film porte'} un regard masculin : ${mCount} critère${mCount > 1 ? 's' : ''} sur ${total} pointent vers le male gaze.`;
    bg = '#FCEBEB';
    borderColor = '#A32D2D';
  }

  area.style.background = bg;
  area.style.borderColor = borderColor;

  const usedWords = [...new Set(criteria.filter(c => checked[c.id]).flatMap(c => c.vocab.split(', ')))];

  area.innerHTML = `
    <div class="step-label">Résultat${film ? ' · ' + film : ''}</div>
    <div class="result-verdict">${verdict}</div>
    <div class="result-sub">${sub}</div>
    <div class="bar-wrap">
      <div class="bar-row">
        <div class="bar-label" style="color:#085041">Female gaze</div>
        <div class="bar-track"><div class="bar-fill" style="width:${fPct}%;background:#0F6E56"></div></div>
        <div class="bar-count">${fCount}</div>
      </div>
      <div class="bar-row">
        <div class="bar-label" style="color:#791F1F">Male gaze</div>
        <div class="bar-track"><div class="bar-fill" style="width:${mPct}%;background:#A32D2D"></div></div>
        <div class="bar-count">${mCount}</div>
      </div>
    </div>
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:#B0AAA3;font-weight:500;margin-top:14px;margin-bottom:5px">Vocabulaire utilisé</div>
    <div class="vocab-chips">${usedWords.map(w => `<span class="word-chip">${w}</span>`).join('')}</div>
  `;
}

function reset() {
  checked = {};
  document.getElementById('film-input').value = '';
  update();
}

renderGrids();
</script>
</body>
</html>
