  .sentence-label{font-size:11px;color:#c48fa8;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px}
  .sentence-text{font-size:18px;color:#f0e4ec;line-height:1.8;font-family:'Playfair Display',serif}

  .sentence-hint{font-size:12px;color:#6a3050;margin-top:10px;font-style:italic}

  .fill-input.ok{border-color:#66bb6a;background:#1a3a1a22}
  .fill-input.wrong{border-color:#ef5350;background:#3a0a0a22;animation:shake 0.3s}

  .answer-reveal{width:100%;background:#1a3a1a;border:1.5px solid #66bb6a;border-radius:12px;padding:14px 20px;text-align:center;color:#66bb6a;font-size:15px}

  .situation-card{background:#2a0e1c;border:1.5px solid #4a1a30;border-radius:12px;padding:14px 16px;font-size:13px;color:#e0c8d0;line-height:1.5;font-style:italic}

  .check-btn{background:linear-gradient(135deg,#c2185b,#e91e8c);border:none;border-radius:12px;padding:13px 24px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%}

function shuffle(arr){return [...arr].sort(()=>Math.random()-0.5);}

const menu=document.getElementById('menu');
const area=document.getElementById('game-area');
function showMenu(){menu.classList.remove('hidden');area.classList.add('hidden');area.innerHTML='';}
function showGame(html){menu.classList.add('hidden');area.classList.remove('hidden');area.innerHTML=html;}
function startGame(t){if(t==='fill')fillGame();if(t==='match')matchGame();if(t==='type')typeGame();}

// ── COMPLÈTE LA PHRASE ───────────────────────────────────────────────────────
function fillGame(){
  const questions=shuffle(FILL_SENTENCES);
  let idx=0,score=0,revealed=false;

  function render(){
    if(idx>=questions.length){
      const pct=Math.round((score/questions.length)*100);
      showGame(`<div class="result-box">
        <div class="result-emoji">${pct>=80?'🏆':pct>=50?'👍':'💪'}</div>
        <div class="result-title">${score} / ${questions.length}</div>
        <div class="result-pct">${pct}% de bonnes réponses</div>
        <button class="btn-primary" onclick="showMenu()">← Menu</button>
      </div>`);return;
    }
    const q=questions[idx];
    const display=q.sentence.replace('___','<span class="blank"></span>');
    showGame(`
      <div class="progress-bar"><div class="progress-fill" style="width:${(idx/questions.length)*100}%"></div></div>
      <div class="score-row">
        <span class="score-chip">⭐ ${score}</span>
        <span class="counter-small">${idx+1} / ${questions.length}</span>
      </div>
      <div class="sentence-box">
        <div class="sentence-label">✏️ Complète la phrase</div>
        <div class="sentence-text">${display}</div>
        <div class="sentence-hint">Écris l'expression manquante</div>
      </div>
      <input class="fill-input" id="fi" placeholder="Ton expression…" autofocus onkeydown="if(event.key==='Enter')checkFill()"/>
      <div id="hint-letters" class="hidden" style="width:100%;text-align:center;font-size:14px;color:#ffb74d;letter-spacing:3px;font-family:'DM Sans',sans-serif;padding:6px 0"></div>
      <div id="reveal-box" class="hidden answer-reveal"></div>
      <div class="btn-row">
        <button class="btn-hint" id="hint-btn" onclick="showHint()">💡 Indice</button>
        <button class="btn-skip" onclick="skipFill()">Voir la réponse</button>
        <button class="btn-primary" id="fi-btn" onclick="checkFill()">Vérifier →</button>
      </div>
      <button class="btn-back" onclick="showMenu()">← Menu</button>
    `);
    window._fAnswer=q.answer; revealed=false; window._hintLevel=0;
    setTimeout(()=>{const el=document.getElementById('fi');if(el)el.focus();},50);
  }

  window.showHint=function(){
    const answer=window._fAnswer;
    const level=window._hintLevel;
    const words=answer.split(' ');
    let hint;
    if(level===0){
      // first letters of each word: p… r…
      hint=words.map(w=>w[0].toUpperCase()+'…').join(' ');
    } else if(level===1){
      // first 2 letters of each word
      hint=words.map(w=>(w.slice(0,2)+'…')).join(' ');
    } else {
      // first 3 letters
      hint=words.map(w=>(w.slice(0,3)+'…')).join(' ');
    }
    const box=document.getElementById('hint-letters');
    if(box){box.classList.remove('hidden');box.textContent='💡 '+hint;}
    window._hintLevel=Math.min(level+1,2);
    const btn=document.getElementById('hint-btn');
    if(btn&&window._hintLevel>=2) btn.disabled=true;
  };

  window.checkFill=function(){
    if(revealed){idx++;render();return;}
    const inp=document.getElementById('fi');if(!inp)return;
    const val=inp.value.trim().toLowerCase();
    const correct=window._fAnswer.toLowerCase();
    const stripped=correct.replace(/^(un|une|le|la|les|l'|se |s')\s*/,'');
    if(val===correct||val===stripped||val===correct.replace(/^(un|une|le|la|les)\s/,'')){
      inp.classList.add('ok');score++;revealed=true;
      document.getElementById('fi-btn').textContent='Suivant →';
    } else {
      inp.classList.add('wrong');
      setTimeout(()=>inp.classList.remove('wrong'),400);
      inp.dataset.tries=(parseInt(inp.dataset.tries||0)+1).toString();
      if(parseInt(inp.dataset.tries)>=2){
        const box=document.getElementById('reveal-box');
        box.classList.remove('hidden');box.textContent='✓ Réponse : '+window._fAnswer;
        revealed=true;document.getElementById('fi-btn').textContent='Suivant →';
      }
    }
  };
  window.skipFill=function(){
    const box=document.getElementById('reveal-box');
    if(box){box.classList.remove('hidden');box.textContent='✓ Réponse : '+window._fAnswer;}
    revealed=true;const btn=document.getElementById('fi-btn');if(btn)btn.textContent='Suivant →';
  };
  render();
}

// ── TROUVE LE MOT ─────────────────────────────────────────────────────────────
function matchGame(){
  const rounds=shuffle(SITUATIONS);
  const BATCH=5;
  let batchIdx=0,totalScore=0;

  function renderBatch(){
    const batch=rounds.slice(batchIdx,batchIdx+BATCH);
    if(batch.length===0){
      const pct=Math.round((totalScore/rounds.length)*100);
      showGame(`<div class="result-box">
        <div class="result-emoji">${pct>=80?'🏆':pct>=50?'👍':'💪'}</div>
        <div class="result-title">${totalScore} / ${rounds.length}</div>
        <div class="result-pct">${pct}% de bonnes réponses</div>
        <button class="btn-primary" onclick="showMenu()">← Menu</button>
      </div>`);return;
    }
    const correctWords=batch.map(b=>b.word);
    const distractors=shuffle(SITUATIONS.filter(s=>!correctWords.includes(s.word)).map(s=>s.word)).slice(0,6);
    const allWords=shuffle([...new Set([...correctWords,...distractors])]);
    const rows=batch.map((b,i)=>`
      <div class="situation-row" id="row${i}">
        <div class="situation-card">${b.situation}</div>
        <select class="word-select" id="sel${i}">
          <option value="">— choisir —</option>
          ${allWords.map(w=>`<option value="${w.replace(/"/g,'&quot;')}">${w}</option>`).join('')}
        </select>
      </div>`).join('');
    showGame(`
      <div class="progress-bar"><div class="progress-fill" style="width:${(batchIdx/rounds.length)*100}%"></div></div>
      <div class="score-row">
        <span class="score-chip">⭐ ${totalScore}</span>
        <span class="counter-small">${batchIdx+1}–${Math.min(batchIdx+BATCH,rounds.length)} / ${rounds.length}</span>
      </div>
      <div style="width:100%;font-size:12px;color:#c48fa8;text-align:center;font-style:italic;margin-bottom:2px">
        🔗 Associe chaque situation à l'expression correcte
      </div>
      <div class="situations-list">${rows}</div>
      <button class="check-btn" id="check-btn" onclick="checkBatch()">Vérifier ✓</button>
      <button class="btn-back" onclick="showMenu()">← Menu</button>
    `);
    window._batch=batch;window._batchChecked=false;
  }

  window.checkBatch=function(){
    if(window._batchChecked)return;
    window._batchChecked=true;
    let batchScore=0;
    window._batch.forEach((b,i)=>{
      const sel=document.getElementById('sel'+i);if(!sel)return;
      if(sel.value===b.word){sel.classList.add('correct');batchScore++;totalScore++;}
      else{
        sel.classList.add('incorrect');
        // inject correct answer
        let found=false;
        for(let o of sel.options){if(o.value===b.word){o.selected=true;found=true;break;}}
        if(!found){const opt=document.createElement('option');opt.value=b.word;opt.textContent='✓ '+b.word;opt.selected=true;sel.appendChild(opt);}
      }
      sel.disabled=true;
    });
    const btn=document.getElementById('check-btn');
    if(btn){btn.textContent=`${batchScore}/${window._batch.length} correct${batchScore!==1?'s':''} — Continuer →`;btn.onclick=()=>{batchIdx+=BATCH;renderBatch();};}
  };
  renderBatch();
}

// ── TRADUCTION ────────────────────────────────────────────────────────────────
function typeGame(){
  const questions=shuffle(VOCAB);
  let idx=0,score=0,revealed=false;

  function render(){
    if(idx>=questions.length){
      const pct=Math.round((score/questions.length)*100);
      showGame(`<div class="result-box">
        <div class="result-emoji">✍️</div>
        <div class="result-title">${score} / ${questions.length}</div>
        <div class="result-pct">${pct}% de bonnes réponses</div>
        <button class="btn-primary" onclick="showMenu()">← Menu</button>
      </div>`);return;
    }
    const q=questions[idx];
    showGame(`
      <div class="progress-bar"><div class="progress-fill" style="width:${(idx/questions.length)*100}%"></div></div>
      <div class="score-row">
        <span class="score-chip">⭐ ${score}</span>
        <span class="counter-small">${idx+1}/${questions.length}</span>
      </div>
      <div class="q-box">
        <div class="q-lang">🇺🇦 Traduis en français</div>
        <div class="q-text">${q.ua}</div>
        <div class="hint-text hidden" id="hint-box">💡 Début : <b>${q.fr.slice(0,3)}…</b></div>
      </div>
      <input class="type-input" id="ti" placeholder="Écris l'expression en français…" autofocus onkeydown="if(event.key==='Enter')checkType()"/>
      <div id="reveal-box2" class="hidden answer-reveal"></div>
      <div class="btn-row">
        <button class="btn-hint" onclick="document.getElementById('hint-box').classList.remove('hidden')">💡 Indice</button>
        <button class="btn-primary" id="ti-btn" onclick="checkType()">Vérifier →</button>
      </div>
      <button class="btn-back" onclick="showMenu()">← Menu</button>
    `);
    window._tAnswer=q.fr;revealed=false;
    setTimeout(()=>{const el=document.getElementById('ti');if(el)el.focus();},50);
  }

  window.checkType=function(){
    if(revealed){idx++;render();return;}
    const inp=document.getElementById('ti');if(!inp)return;
    const val=inp.value.trim().toLowerCase();
    const correct=window._tAnswer.toLowerCase();
    if(val===correct){
      inp.classList.add('ok');score++;revealed=true;
      document.getElementById('ti-btn').textContent='Suivant →';
    } else {
      inp.classList.add('wrong');
      setTimeout(()=>inp.classList.remove('wrong'),400);
      inp.dataset.tries=(parseInt(inp.dataset.tries||0)+1).toString();
      if(parseInt(inp.dataset.tries)>=2){
        const box=document.getElementById('reveal-box2');
        box.classList.remove('hidden');box.textContent='✓ Réponse : '+window._tAnswer;
        revealed=true;document.getElementById('ti-btn').textContent='Suivant →';
      }
    }
  };
  render();
}
</script>
